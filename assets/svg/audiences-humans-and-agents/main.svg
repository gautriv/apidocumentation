<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet" style="max-width:100%;height:auto;" data-svg-pattern="toggle" data-states="DEV,ATLAS" tabindex="0" role="switch" aria-checked="false" aria-label="Toggle the response JSON between the DEV reader's view and the ATLAS reader's view">
  <title>One response JSON seen by two readers</title>
  <desc>The GET /v1/books 200 response shown as JSON in the center. Two annotation layers overlay it. The DEV layer underlines all four field key-value pairs and shows three steps a developer takes: copy the snippet, recognize 813.5 as a Dewey number, ship. The ATLAS layer dims everything except call_number 813.5, which gets a copper box, and shows three steps: Atlas reads the value, Atlas tells Mira "it is at 813.5", Mira walks to a shelf that does not exist. Toggle to switch between views.</desc>

  <style>
    .json-text { font-family: 'SF Mono', Menlo, monospace; font-size: 14px; fill: #0c1a2b; }
    .anno-heading { font-family: Georgia, serif; font-size: 15px; fill: #0c1a2b; font-weight: bold; }
    .anno-step { font-family: Georgia, serif; font-size: 13px; fill: #0c1a2b; }
    .anno-step-quote { font-family: Georgia, serif; font-size: 13px; fill: #0c1a2b; font-style: italic; }
    .toggle-hint { font-family: Georgia, serif; font-size: 12px; fill: #0c1a2b; opacity: 0.65; }
    .state-label { font-family: Georgia, serif; font-size: 14px; fill: #0c1a2b; font-weight: bold; }

    .layer-dev { opacity: 1; transition: opacity 0.2s ease; }
    .layer-atlas { opacity: 0.12; transition: opacity 0.2s ease; }
    svg[data-state="ATLAS"] .layer-dev { opacity: 0.12; }
    svg[data-state="ATLAS"] .layer-atlas { opacity: 1; }
    svg[data-state="ATLAS"] .json-text:not(.json-call-number) { opacity: 0.4; transition: opacity 0.2s ease; }

    @media (prefers-reduced-motion: reduce) {
      .layer-dev, .layer-atlas, .json-text { transition: none; }
    }

    svg:focus { outline: none; }
    svg:focus-visible { outline: 2px solid #b85c38; outline-offset: 4px; }
  </style>

  <rect x="0" y="0" width="800" height="500" fill="#FFFFFF" />

  <text x="400" y="28" text-anchor="middle" class="toggle-hint">Click the diagram or press Enter to toggle. Current view shown at the bottom.</text>

  <!-- JSON code panel (visible in both states; dimmed in Atlas state via CSS) -->
  <g class="json-panel">
    <rect x="40" y="60" width="380" height="370" fill="#fbf8f3" stroke="#0c1a2b" stroke-width="1.5" rx="4" />
    <text x="56" y="92" class="json-text">{</text>
    <text x="72" y="112" class="json-text">"results": [</text>
    <text x="88" y="132" class="json-text">{</text>
    <text x="104" y="152" class="json-text">"id": "bk_184932",</text>
    <text x="104" y="172" class="json-text">"title": "The Quiet Library",</text>
    <text x="104" y="192" class="json-text">"available_branches":</text>
    <text x="104" y="212" class="json-text">  ["branch_north"],</text>
    <!-- call_number gets special class so it stays bright in Atlas state -->
    <text x="104" y="232" class="json-text json-call-number">"call_number": "813.5"</text>
    <text x="88" y="252" class="json-text">}</text>
    <text x="72" y="272" class="json-text">],</text>
    <text x="72" y="292" class="json-text">"total": 1</text>
    <text x="56" y="312" class="json-text">}</text>
  </g>

  <!-- DEV layer: sage underlines on all four field key-value pairs -->
  <g class="layer-dev">
    <line x1="100" y1="156" x2="240" y2="156" stroke="#5a7a64" stroke-width="1.5" />
    <line x1="100" y1="176" x2="290" y2="176" stroke="#5a7a64" stroke-width="1.5" />
    <line x1="100" y1="196" x2="260" y2="196" stroke="#5a7a64" stroke-width="1.5" />
    <line x1="100" y1="216" x2="220" y2="216" stroke="#5a7a64" stroke-width="1.5" />
    <line x1="100" y1="236" x2="260" y2="236" stroke="#5a7a64" stroke-width="1.5" />
  </g>

  <!-- ATLAS layer: copper box around call_number only -->
  <g class="layer-atlas">
    <rect x="98" y="218" width="220" height="22" fill="none" stroke="#b85c38" stroke-width="1.5" rx="4" />
  </g>

  <!-- DEV annotation panel (right side, visible in DEV state) -->
  <g class="layer-dev">
    <rect x="460" y="60" width="300" height="370" fill="#fbf8f3" stroke="#0c1a2b" stroke-width="1.5" rx="4" />
    <text x="480" y="100" class="anno-heading">What the dev notices</text>
    <text x="480" y="148" class="anno-step">1. Dev copies the snippet.</text>
    <text x="480" y="196" class="anno-step">2. Notices call_number "813.5"</text>
    <text x="480" y="214" class="anno-step">    is a Dewey number.</text>
    <text x="480" y="262" class="anno-step">3. Ships.</text>
  </g>

  <!-- ATLAS annotation panel (right side, visible in ATLAS state) -->
  <g class="layer-atlas">
    <rect x="460" y="60" width="300" height="370" fill="#fbf8f3" stroke="#0c1a2b" stroke-width="1.5" rx="4" />
    <text x="480" y="100" class="anno-heading">What Atlas does</text>
    <text x="480" y="148" class="anno-step">1. Atlas reads</text>
    <text x="480" y="166" class="anno-step">    call_number "813.5".</text>
    <text x="480" y="214" class="anno-step">2. Atlas tells Mira:</text>
    <text x="480" y="232" class="anno-step-quote">    "It is at 813.5."</text>
    <text x="480" y="280" class="anno-step">3. Mira walks to a shelf</text>
    <text x="480" y="298" class="anno-step">    that does not exist.</text>
  </g>

  <text x="400" y="470" text-anchor="middle" class="state-label">Reading as: <tspan class="toggle-label">DEV</tspan></text>
</svg>
