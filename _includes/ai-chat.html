<div class="fixed bottom-6 right-6 z-40">
  <button id="ai-bubble" onclick="toggleChat()" class="chat-bubble bg-ink text-cream rounded-full pl-4 pr-5 py-3 shadow-xl flex items-center gap-3 hover:bg-ink/90">
    <span class="w-8 h-8 rounded-full bg-copper text-cream flex items-center justify-center font-serif text-base font-semibold">M</span>
    <span class="hidden sm:inline text-sm">Ask Maya</span>
    <span class="hidden sm:inline text-xs text-cream/50 font-mono">AI</span>
  </button>

  <div id="ai-chat-panel" class="absolute bottom-16 right-0 w-[min(380px,calc(100vw-3rem))] origin-bottom-right opacity-0 pointer-events-none -translate-y-2 scale-95 transition-all duration-200 bg-cream border border-ink/10 rounded-2xl shadow-2xl overflow-hidden">
    <div class="bg-ink text-cream px-5 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="w-9 h-9 rounded-full bg-copper text-cream flex items-center justify-center font-serif font-semibold">M</span>
        <div>
          <div class="text-sm font-medium">Maya (the AI co-pilot)</div>
          <div class="text-xs text-cream/55 font-mono">trained on all 36 lessons · claude-haiku</div>
        </div>
      </div>
      <button onclick="toggleChat()" class="text-cream/60 hover:text-cream text-lg leading-none">×</button>
    </div>
    <div class="p-5 max-h-[420px] overflow-auto bg-cream" id="ai-chat-history">
      <!-- Messages go here -->
    </div>
    <div class="border-t border-ink/10 p-3 bg-cream">
      <form class="flex items-center gap-2">
        <input type="text" placeholder="Ask Maya about any lesson…" class="flex-1 bg-ink/5 rounded-full px-4 py-2 text-sm focus:outline-none focus:bg-ink/[0.08]" />
        <button type="submit" class="bg-ink text-cream rounded-full w-9 h-9 flex items-center justify-center hover:bg-ink/85">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </form>
    </div>
  </div>
</div>
