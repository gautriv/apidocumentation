<div id="cmdk" class="fixed inset-0 z-50 bg-ink/40 backdrop-blur-sm flex items-start justify-center p-6 pt-[15vh] opacity-0 pointer-events-none transition-opacity duration-150">
  <div class="cmdk-card bg-cream rounded-2xl shadow-2xl max-w-xl w-full overflow-hidden transform translate-y-2 scale-[0.98] transition-transform duration-150">
    <div class="flex items-center gap-3 px-5 py-4 border-b border-ink/10">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0c1a2b" stroke-opacity="0.55" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="cmdk-input" placeholder="Search lessons, glossary, exercises…" class="flex-1 bg-transparent focus:outline-none text-base" />
      <button onclick="closeCmdK()" class="text-xs text-ink/40 font-mono">ESC</button>
    </div>
    <div id="cmdk-results" class="max-h-[50vh] overflow-auto py-2">
      <!-- Pagefind results will be injected here -->
    </div>
    <div class="border-t border-ink/10 px-5 py-2.5 text-xs text-ink/45 font-mono flex items-center justify-between">
      <span>↑↓ navigate · ↵ open · ESC close</span>
      <span>Pagefind</span>
    </div>
  </div>
</div>
