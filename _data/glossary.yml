- term: "JWT"
  definition: "JSON Web Token. A compact URL safe means of representing claims to be transferred between two parties."
  link: "#"
- term: "MCP"
  definition: "Model Context Protocol. How agents discover and call tools."
  link: "#"
- term: "LLM"
  definition: "Large Language Models. GPT, Claude, Gemini, and others."
  link: "#"
- term: "429"
  definition: "Too Many Requests. You, specifically, are over your rate limit."
  link: "#"
- term: "contract"
  definition: "The rules two pieces of software agreed to about a call. The caller sends a specific shape; the server sends a specific shape back. Breaking it breaks callers."
  link: "#"
- term: "endpoint"
  definition: "One URL plus one method (like GET /books). An API is a collection of endpoints."
  link: "#"
- term: "response shape"
  definition: "The structure of the data the server sends back, not the status code. A change to the shape can break callers even when the URL stays the same."
  link: "#"
- term: "status code"
  definition: "The number the server returns with every response. 200 is fine. 4xx means the caller did something wrong. 5xx means the server did."
  link: "#"
- term: "agent"
  definition: "A piece of software calling an API on behalf of a person. From 2024 onward, an increasing share of API traffic is from agents, not browsers."
  link: "#"
- term: "request"
  definition: "What the caller sends to the server. A method, a path, often a body. The first half of every API call."
  link: "#"
- term: "response"
  definition: "What the server sends back. A status code, often a body. The second half of every API call."
  link: "#"
- term: "caller"
  definition: "The piece of software that sends a request. A browser, a phone app, a script, or another server can all be callers. Sometimes called the client."
  link: "#"
- term: "server"
  definition: "The piece of software that receives a request and decides what to send back. Sits at a URL the caller knows."
  link: "#"
- term: "reader"
  definition: "The party consuming a piece of documentation. In 2026, a reader is either a human (a developer, support engineer, or another writer) or an agent (software trying to figure out how to call the API: code generators, AI assistants, tool-use loops). A page that serves only one is leaving the other behind."
  link: "#"
- term: "source of truth"
  definition: "The authoritative version of a piece of information. When two places disagree about what something is, the source of truth wins. In a codebase, the route handler is the source of truth for what an endpoint does."
  link: "#"
- term: "SME"
  definition: "Subject matter expert. The person on the team who knows things only people know. An engineer is the SME for an endpoint they built. A PM is the SME for why a feature exists."
  link: "#"
- term: "schema"
  definition: "The structural description of the data sent or received by an API. Names the fields, their types, and which are required. Lives in OpenAPI, JSON Schema, or the code that generates them."
  link: "#"
- term: "OpenAPI"
  definition: "The standard for describing REST APIs in YAML or JSON. Often shipped as a single file in the repo. Both humans and tools can read it; tools generate client libraries from it."
  link: "#"
